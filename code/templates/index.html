<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>3RRS Robot Simulator - Web</title>
  <style>
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    /* Left panel for 3D view */
    #left-panel {
      flex: 3;
      background: #222;
    }

    /* Right panel for controls */
    #right-panel {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      background: #f0f0f0;
    }

    .group-box {
      border: 1px solid #aaa;
      margin-bottom: 10px;
      padding: 10px;
    }

    .group-box h3 {
      margin-top: 0;
    }

    .control-row {
      margin-bottom: 5px;
    }

    label {
      display: inline-block;
      width: 50px;
    }

    button {
      margin-right: 5px;
    }

    input[type="number"] {
      width: 70px;
    }
  </style>
</head>

<body>
  <div id="left-panel">
    <img src="http://raspi11:5100/video_feed" width="100%">
    <!-- Three.js rendering canvas is appended here by main.js -->
  </div>
  <div id="right-panel">
    <!-- Robot Mode -->
    <div class="group-box">
      <div class="control-row">
        <label>Mode:</label>
        <span id="robot_mode">
          <select id="select_mode" onchange="set_mode()">
            <option value="manual">Manual</option>
            <option value="auto">Auto</option>
            <option value="calibration">Calibration</option>
          </select>
        </span>
        <span> Contours: </span>
        <input type="checkbox" id="show_contours_checkbox" onchange="set_ctrl_params()">
      </div>
      <div class="control-row">
        <label>Rec:</label>
        <span id="record">
          <input type="checkbox" id="record_checkbox" onchange="set_pid_recording()">
        </span>
        <span> Records: </span>
        <span id="record_count">0</span>
      </div>
    </div>

    <!-- Robot Params -->
    <div class="group-box">
      <h3>Robot Parameters</h3>
      <div class="control-row"><label>lp:</label> <span id="robot_lp">0</span></div>
      <div class="control-row"><label>l1:</label> <span id="robot_l1">0</span></div>
      <div class="control-row"><label>l2:</label> <span id="robot_l2">0</span></div>
      <div class="control-row"><label>lb:</label> <span id="robot_lb">0</span></div>
      <div class="control-row"><label>minh:</label> <span id="robot_minh">0</span></div>
      <div class="control-row"><label>maxh:</label> <span id="robot_maxh">0</span></div>
      <div class="control-row"><label>θ max:</label> <span id="robot_theta_ubound">0</span></div>
    </div>

    <!-- Robot Calibration -->
    <div class="group-box">
      <h3>Robot Calibration</h3>
      <div id="calibration_off" style="display:block">
        <div class="control-row"><label>θ₁ off:</label> <span id="robot_theta1_offset">0</span></div>
        <div class="control-row"><label>θ₂ off:</label> <span id="robot_theta2_offset">0</span></div>
        <div class="control-row"><label>θ₃ off:</label> <span id="robot_theta3_offset">0</span></div>
      </div>
      <div id="calibration_on" style="display:none">
        <div class="control-row">
          <label>θ₁ off:</label> 
          <input type="number" id="robot_theta1_offset_input" min="0" max="90" step="0.01" value="0"
            onchange="calib_s1(this.value)">
        </div>
        <div class="control-row">
          <label>θ₂ off:</label>
          <input type="number" id="robot_theta2_offset_input" min="0" max="90" step="0.01" value="0"
            onchange="calib_s2(this.value)">
        </div>
        <div class="control-row">
          <label>θ₃ off:</label>
          <input type="number" id="robot_theta3_offset_input" min="0" max="90" step="0.01" value="0"
            onchange="calib_s3(this.value)">
          <button id="calib_save_button" onclick="confirm_save_calibration()">Save</button>
        </div>
      </div>
    </div>

    <!-- Input Sliders -->
    <div class="group-box">
      <h3>Input</h3>
      <!-- Theta -->
      <div class="control-row">
        <label>θ:</label>
        <!-- slider 0..2000 => 0..20.00 degrees -->
        <input type="range" id="slider_theta" min="0" max="2000" step="1" value="0"
          onchange="set_theta('slider', this.value)">
        <input type="number" id="spin_theta" min="0" max="20" step="0.01" value="0"
          onchange="set_theta('spin', this.value * 100)">
      </div>
      <!-- Phi -->
      <div class="control-row">
        <label>φ:</label>
        <!-- slider 0..36000 => 0..360.00 degrees -->
        <input type="range" id="slider_phi" min="0" max="36000" step="1" value="0"
          onchange="set_phi('slider', this.value)">
        <input type="number" id="spin_phi" min="0" max="360" step="0.01" value="0"
          onchange="set_phi('spin', this.value * 100)">
      </div>
      <!-- h -->
      <div class="control-row">
        <label>h:</label>
        <!-- slider range is dynamic from server, but start with a wide range -->
        <input type="range" id="slider_h" min="0" max="2000" step="1" value="0" onchange="set_h('slider', this.value)">
        <input type="number" id="spin_h" min="0" max="20" step="0.01" value="0"
          onchange="set_h('spin', this.value * 100)">
      </div>
      <!-- Buttons -->
      <div class="control-row">
        <button id="reset_button" onclick="confirm_reset()">Reset</button>
      </div>
    </div>

    <!-- Output -->
    <div class="group-box">
      <h3>Robot State</h3>
      <div class="control-row">
        <label>h:</label>
        <span id="label_h">0</span>
      </div>
      <div class="control-row">
        <label>θmax:</label>
        <span id="label_theta_max">0</span>
      </div>
      <div class="control-row">
        <label>(x,y,z):</label>
        <span>(</span>
        <span id="label_x">0</span>
        <span>,</span>
        <span id="label_y">0</span>
        <span>,</span>
        <span id="label_z">0</span>
        <span>)</span>
      </div>
      <div class="control-row">
        <label>θ₁:</label>
        <span id="label_theta1">0</span>
      </div>
      <div class="control-row">
        <label>θ₂:</label>
        <span id="label_theta2">0</span>
      </div>
      <div class="control-row">
        <label>θ₃:</label>
        <span id="label_theta3">0</span>
      </div>
    </div>

    <!-- PID -->
    <div class="group-box">
      <h3>PID</h3>
      <div class="control-row">
        <label>Kp:</label>
        <input type="number" id="kp" min="0" max="1" step="0.0001" value="0"
          onchange="set_pid_param('kp', this.value)">
      </div>
      <div class="control-row">
        <label>Ki:</label>
        <input type="number" id="ki" min="0" max="1" step="0.0001" value="0"
          onchange="set_pid_param('ki', this.value)">
      </div>
      <div class="control-row">
        <label>Kd:</label>
        <input type="number" id="kd" min="0" max="1" step="0.0001" value="0"
          onchange="set_pid_param('kd', this.value)">
      </div>
      <div class="control-row">
        <label>α:</label>
        <input type="number" id="alpha" min="0" max="1" step="0.0001" value="0"
          onchange="set_pid_param('alpha', this.value)">
      </div>
      <div class="control-row">
        <label>β:</label>
        <input type="number" id="beta" min="0" max="1" step="0.0001" value="0"
          onchange="set_pid_param('beta', this.value)">
      </div>
      <div class="control-row">
        <label>|E|:</label>
        <span id="err_abs">0.00</span>
      </div>
      <div class="control-row">
        <label>E:</label>
        <span>(</span>
        <span id="err_x">0.00</span>
        <span>,</span>
        <span id="err_y">0.00</span>
        <span>)</span>
      </div>
      <div class="control-row">
        <label>∫E*dt:</label>
        <span>(</span>
        <span id="err_i_x">0.00</span>
        <span>,</span>
        <span id="err_i_y">0.00</span>
        <span>)</span>
      </div>
      <div class="control-row">
        <label>dE/dt:</label>
        <span>(</span>
        <span id="err_d_x">0.00</span>
        <span>,</span>
        <span id="err_d_y">0.00</span>
        <span>)</span>
      </div>
      <div class="control-row">
        <label>PID:</label>
        <span>(</span>
        <span id="pid_x">0.00</span>
        <span>,</span>
        <span id="pid_y">0.00</span>
        <span>)</span>
      </div>
      <div class="control-row">
        <label>PID-f:</label>
        <span>(</span>
        <span id="pid_f_x">0.00</span>
        <span>,</span>
        <span id="pid_f_y">0.00</span>
        <span>)</span>
      </div>
      <div class="control-row">
        <label>θ, φ:</label>
        <span>(</span>
        <span id="pid_theta">0.00</span>
        <span>,</span>
        <span id="pid_phi">0.00</span>
        <span>)</span>
      </div>
      <!-- Buttons -->
      <div class="control-row">
        <button id="pid_simulate_button" onclick="simulate_pid()">Simulate</button>
        <button id="pid_reset_button" onclick="save_reset_pid()">Save & Reset</button>
      </div>
    </div>
  </div>

  <!-- Web Sockets -->
  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

  <!-- Three.js 
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="{{ url_for('static', filename='main.js') }}"></script>
  -->

  <script>
    const socket = io();

    function calib_s1(value) {
      let offset = parseFloat(value);
      // Send new offset to server
      socket.emit("calibrate", { servo: 1, offset: offset });
    }

    function calib_s2(value) {
      let offset = parseFloat(value);
      // Send new offset to server
      socket.emit("calibrate", { servo: 2, offset: offset });
    }

    function calib_s3(value) {
      let offset = parseFloat(value);
      // Send new offset to server
      socket.emit("calibrate", { servo: 3, offset: offset });
    }

    function confirm_save_calibration() {
      if (confirm("Do you want to save calibration and switch to manual mode?")) {
        socket.emit("save_calibration");
      }
    }

    function set_theta(origin, value) {
      let theta = parseFloat(value) / 100;
      if (origin === 'slider') {
        document.getElementById('spin_theta').value = theta.toFixed(2);
      } else {
        document.getElementById('slider_theta').value = Math.round(theta * 100);
      }
      // Send new theta to server
      socket.emit("update_robot", { theta: theta, phi: parseFloat(document.getElementById('spin_phi').value), h: parseFloat(document.getElementById('spin_h').value) });
    }

    function set_phi(origin, value) {
      let phi = parseFloat(value) / 100;
      if (origin === 'slider') {
        document.getElementById('spin_phi').value = phi.toFixed(2);
      } else {
        document.getElementById('slider_phi').value = Math.round(phi * 100);
      }
      // Send new phi to server
      socket.emit("update_robot", { theta: parseFloat(document.getElementById('spin_theta').value), phi: phi, h: parseFloat(document.getElementById('spin_h').value) });
    }

    function set_h(origin, value) {
      let h = parseFloat(value) / 100;
      if (origin === 'slider') {
        document.getElementById('spin_h').value = h.toFixed(2);
      } else {
        document.getElementById('slider_h').value = Math.round(h * 100);
      }
      // Send new h to server
      socket.emit("update_robot", { theta: parseFloat(document.getElementById('spin_theta').value), phi: parseFloat(document.getElementById('spin_phi').value), h: h });
    }

    function confirm_reset() {
      if (confirm("Do you want to reset the robot to its default state?")) {
        socket.emit("reset_robot");
      }
    }

    function set_mode() {
      new_mode = document.getElementById("select_mode").value;
      if (confirm("Do you want to set the mode to " + new_mode + "?")) {
        socket.emit("set_mode", { mode: new_mode });
      }
    }

    function set_pid_param(param, value) {
      socket.emit("set_pid_param", { param: param, value: value });
    }

    function simulate_pid() {
        socket.emit("simulate_pid");
    }

    function save_reset_pid() {
        kp = document.getElementById("kp").value
        ki = document.getElementById("ki").value
        kd = document.getElementById("kd").value
        alpha = document.getElementById("alpha").value
        beta = document.getElementById("beta").value
        socket.emit("save_reset_pid", {kp: kp, ki: ki, kd: kd, alpha: alpha, beta: beta});
    }

    function set_pid_recording() {
      record_checkbox = document.getElementById("record_checkbox");
      record = record_checkbox.checked;
      if (record == true) {
        if (!confirm("Start recording PID data? This will create a new CSV file on the server.")) {
          record_checkbox.checked = false;
          return;
        } else {
          // If user confirms, reset the record count to 0
          document.getElementById("record_count").textContent = "0";
        }
      }
      if (record == false) {
        if (!confirm("Stop recording PID data? This will save the recorded PID data to a CSV file.")) {
          record_checkbox.checked = true;
          return;
        }
      }
      socket.emit("set_pid_recording", {record: record_checkbox.checked});
    }

    function set_ctrl_params() {
        show_contours = document.getElementById("show_contours_checkbox").checked;
        console.log("set_ctrl_params - show_contours:", show_contours);
        socket.emit("set_ctrl_params", {show_contours: show_contours});
    }

    socket.on("connect", () => {
      console.log("Connected");

      // Request initial data
      socket.emit("request_initial_data");
    });

    socket.on("state_update", (data) => {
      console.log("socket.on(state_update) - data:", data);
      document.getElementById("select_mode").value = (data.mode);
      document.getElementById("show_contours_checkbox").checked = Boolean(data.show_contours);
      document.getElementById("slider_theta").value = (data.theta * 100).toFixed();
      document.getElementById("spin_theta").value = data.theta.toFixed(2);
      document.getElementById("slider_phi").value = (data.phi * 100).toFixed();
      document.getElementById("spin_phi").value = data.phi.toFixed(2);
      document.getElementById("slider_h").value = (data.h * 100).toFixed();
      document.getElementById("spin_h").value = data.h.toFixed(2);
      document.getElementById("label_h").textContent = data.h.toFixed(2);
      document.getElementById("label_theta_max").textContent = data.theta_max.toFixed(2);
      document.getElementById("label_x").textContent = data.x.toFixed(2);
      document.getElementById("label_y").textContent = data.y.toFixed(2);
      document.getElementById("label_z").textContent = data.z.toFixed(2);
      document.getElementById("label_theta1").textContent = data.theta1.toFixed(2);
      document.getElementById("label_theta2").textContent = data.theta2.toFixed(2);
      document.getElementById("label_theta3").textContent = data.theta3.toFixed(2);
      document.getElementById("robot_theta1_offset").textContent = data.theta1_offset.toFixed(2);
      document.getElementById("robot_theta2_offset").textContent = data.theta2_offset.toFixed(2);
      document.getElementById("robot_theta3_offset").textContent = data.theta3_offset.toFixed(2);
      document.getElementById("robot_theta1_offset_input").value = data.theta1_offset.toFixed(2);
      document.getElementById("robot_theta2_offset_input").value = data.theta2_offset.toFixed(2);
      document.getElementById("robot_theta3_offset_input").value = data.theta3_offset.toFixed(2);
      if (data.mode === "calibration") {
        document.getElementById("calibration_off").style.display = "none";
        document.getElementById("calibration_on").style.display = "block";
      } else {
        document.getElementById("calibration_off").style.display = "block";
        document.getElementById("calibration_on").style.display = "none";
      }
      if (data.mode === "auto") {
        document.getElementById("slider_theta").disabled = true;
        document.getElementById("spin_theta").disabled = true;
        document.getElementById("slider_phi").disabled = true;
        document.getElementById("spin_phi").disabled = true;
        document.getElementById("slider_h").disabled = true;
        document.getElementById("spin_h").disabled = true;
      } else {
        document.getElementById("slider_theta").disabled = false;
        document.getElementById("spin_theta").disabled = false;
        document.getElementById("slider_phi").disabled = false;
        document.getElementById("spin_phi").disabled = false;
        document.getElementById("slider_h").disabled = false;
        document.getElementById("spin_h").disabled = false;
      }
    });

    socket.on("params_update", (data) => {
      console.log("socket.on(params_update) - data:", data);
      document.getElementById("robot_lp").textContent = data.lp.toFixed(2);
      document.getElementById("robot_l1").textContent = data.l1.toFixed(2);
      document.getElementById("robot_l2").textContent = data.l2.toFixed(2);
      document.getElementById("robot_lb").textContent = data.lb.toFixed(2);
      document.getElementById("robot_minh").textContent = data.minh.toFixed(2);
      document.getElementById("robot_maxh").textContent = data.maxh.toFixed(2);
      document.getElementById("robot_theta_ubound").textContent = data.theta_ubound.toFixed(2);
      document.getElementById("slider_h").min = (data.minh * 100).toFixed();
      document.getElementById("slider_h").max = (data.maxh * 100).toFixed();
      document.getElementById("spin_h").min = data.minh.toFixed(2);
      document.getElementById("spin_h").max = data.maxh.toFixed(2);
      document.getElementById("kp").value = data.kp.toFixed(4);
      document.getElementById("ki").value = data.ki.toFixed(4);
      document.getElementById("kd").value = data.kd.toFixed(4);
      document.getElementById("alpha").value = data.alpha.toFixed(4);
      document.getElementById("beta").value = data.beta.toFixed(4);
    });

    socket.on("pid_simulation_update", (data) => {
      console.log("socket.on(pid_simulation_update) - data:", data);
      document.getElementById("err_abs").textContent = data.err_abs.toFixed(2);
      document.getElementById("err_x").textContent = data.err[0].toFixed(2);
      document.getElementById("err_y").textContent = data.err[1].toFixed(2);
      document.getElementById("err_i_x").textContent = data.err_i[0].toFixed(2);
      document.getElementById("err_i_y").textContent = data.err_i[1].toFixed(2);
      document.getElementById("err_d_x").textContent = data.err_d[0].toFixed(2);
      document.getElementById("err_d_y").textContent = data.err_d[1].toFixed(2);
      document.getElementById("pid_x").textContent = data.pid[0].toFixed(2);
      document.getElementById("pid_y").textContent = data.pid[1].toFixed(2);
      document.getElementById("pid_f_x").textContent = data.pid_f[0].toFixed(2);
      document.getElementById("pid_f_y").textContent = data.pid_f[1].toFixed(2);
      document.getElementById("pid_theta").textContent = data.theta.toFixed(2);
      document.getElementById("pid_phi").textContent = data.phi.toFixed(2);
    });

    socket.on("pid_recording_update", (data) => {
      console.log("socket.on(pid_recording_update) - data:", data);
      document.getElementById("record_checkbox").checked = Boolean(data.recording);
      document.getElementById("record_count").textContent = data.recorded.toFixed();
    });

  </script>
</body>

</html>
