<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3RRS Robot Simulator - Web</title>
  <style>
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      font-family: Arial, sans-serif;
    }
    /* Left panel for 3D view */
    #left-panel {
      flex: 3;
      background: #222;
    }
    /* Right panel for controls */
    #right-panel {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      background: #f0f0f0;
    }
    .group-box {
      border: 1px solid #aaa;
      margin-bottom: 10px;
      padding: 10px;
    }
    .group-box h3 {
      margin-top: 0;
    }
    .control-row {
      margin-bottom: 5px;
    }
    label {
      display: inline-block;
      width: 50px;
    }
    button {
      margin-right: 5px;
    }
    input[type="number"] {
      width: 70px;
    }
  </style>
</head>
<body>
  <div id="left-panel">
    <img src="http://raspi11:5100/video_feed" width="100%">
    <!-- Three.js rendering canvas is appended here by main.js -->
  </div>
  <div id="right-panel">
    <!-- Robot Mode -->
    <div class="group-box">
      <div class="control-row">
        <label>Mode:</label>
        <span id="robot_mode">
          <select id="select_mode" onchange="set_mode()">
            <option value="manual">Manual</option>
            <option value="auto">Auto</option>
            <option value="calibration">Calibration</option>
          </select>
        </span></div>
    </div>

    <!-- Robot Params -->
    <div class="group-box">
      <h3>Robot Parameters</h3>
      <div class="control-row"><label>lp:</label>   <span id="robot_lp">0</span></div>
      <div class="control-row"><label>l1:</label>   <span id="robot_l1">0</span></div>
      <div class="control-row"><label>l2:</label>   <span id="robot_l2">0</span></div>
      <div class="control-row"><label>lb:</label>   <span id="robot_lb">0</span></div>
      <div class="control-row"><label>minh:</label> <span id="robot_minh">0</span></div>
      <div class="control-row"><label>maxh:</label> <span id="robot_maxh">0</span></div>
      <div class="control-row"><label>θ max:</label> <span id="robot_theta_ubound">0</span></div>
    </div>

    <!-- Robot Calibration -->
    <div class="group-box">
      <h3>Robot Calibration</h3>
      <div class="control-row"><label>θ₁ off:</label> <span id="robot_theta1_offset">0</span></div>
      <div class="control-row"><label>θ₂ off:</label> <span id="robot_theta2_offset">0</span></div>
      <div class="control-row"><label>θ₃ off:</label> <span id="robot_theta3_offset">0</span></div>
    </div>

    <!-- Input Sliders -->
    <div class="group-box">
      <h3>Input</h3>
      <!-- Theta -->
      <div class="control-row">
        <label>θ:</label>
        <!-- slider 0..2000 => 0..20.00 degrees -->
        <input 
          type="range" 
          id="slider_theta" 
          min="0" 
          max="2000" 
          step="1"
          value="0"
          onchange="set_theta('slider', this.value)">
        <input 
          type="number" 
          id="spin_theta" 
          min="0" 
          max="20" 
          step="0.01" 
          value="0"
          onchange="set_theta('spin', this.value * 100)">
      </div>
      <!-- Phi -->
      <div class="control-row">
        <label>φ:</label>
        <!-- slider 0..36000 => 0..360.00 degrees -->
        <input 
          type="range" 
          id="slider_phi" 
          min="0" 
          max="36000" 
          step="1"
          value="0"
          onchange="set_phi('slider', this.value)">
        <input 
          type="number" 
          id="spin_phi" 
          min="0" 
          max="360" 
          step="0.01" 
          value="0" 
          onchange="set_phi('spin', this.value * 100)">
      </div>
      <!-- h -->
      <div class="control-row">
        <label>h:</label>
        <!-- slider range is dynamic from server, but start with a wide range -->
        <input 
          type="range" 
          id="slider_h" 
          min="0" 
          max="2000" 
          step="1"
          value="0"
          onchange="set_h('slider', this.value)">
        <input 
          type="number" 
          id="spin_h" 
          min="0" 
          max="20" 
          step="0.01"
          value="0"
          onchange="set_h('spin', this.value * 100)">
      </div>
      <!-- Buttons -->
      <div class="control-row">
        <button id="reset_button" onclick="confirm_reset()">Reset</button>
      </div>
    </div>

    <!-- Output -->
    <div class="group-box">
      <h3>Output</h3>
      <div class="control-row">
        <label>h:</label>
        <span id="label_h">0</span>
      </div>
      <div class="control-row">
        <label>θmax:</label>
        <span id="label_theta_max">0</span>
      </div>
      <div class="control-row">
        <label>x:</label>
        <span id="label_x">0</span>
      </div>
      <div class="control-row">
        <label>y:</label>
        <span id="label_y">0</span>
      </div>
      <div class="control-row">
        <label>z:</label>
        <span id="label_z">0</span>
      </div>
      <div class="control-row">
        <label>θ₁:</label>
        <span id="label_theta1">0</span>
      </div>
      <div class="control-row">
        <label>θ₂:</label>
        <span id="label_theta2">0</span>
      </div>
      <div class="control-row">
        <label>θ₃:</label>
        <span id="label_theta3">0</span>
      </div>
    </div>
  </div>

  <!-- Web Sockets -->
  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

  <!-- Three.js 
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="{{ url_for('static', filename='main.js') }}"></script>
  -->

  <script>
    const socket = io();

    function set_theta(origin, value) {
      let theta = parseFloat(value) / 100;
      if (origin === 'slider') {
        document.getElementById('spin_theta').value = theta.toFixed(2);
      } else {
        document.getElementById('slider_theta').value = Math.round(theta * 100);
      }
      // Send new theta to server
      socket.emit("update_robot", {theta: theta, phi: parseFloat(document.getElementById('spin_phi').value), h: parseFloat(document.getElementById('spin_h').value) });
    }

    function set_phi(origin, value) {
      let phi = parseFloat(value) / 100;
      if (origin === 'slider') {
        document.getElementById('spin_phi').value = phi.toFixed(2);
      } else {
        document.getElementById('slider_phi').value = Math.round(phi * 100);
      }
      // Send new phi to server
      socket.emit("update_robot", {theta: parseFloat(document.getElementById('spin_theta').value), phi: phi, h: parseFloat(document.getElementById('spin_h').value) });
    }

    function set_h(origin, value) {
      let h = parseFloat(value) / 100;
      if (origin === 'slider') {
        document.getElementById('spin_h').value = h.toFixed(2);
      } else {
        document.getElementById('slider_h').value = Math.round(h * 100);
      }
      // Send new h to server
      socket.emit("update_robot", {theta: parseFloat(document.getElementById('spin_theta').value), phi: parseFloat(document.getElementById('spin_phi').value), h: h });
    }

    function confirm_reset() {
      if (confirm("Do you want to reset the robot to its default state?")) {
        socket.emit("reset_robot");
      }
    }

    function set_mode() {
      new_mode = document.getElementById("select_mode").value;
      if (confirm("Do you want to set the mode to " + new_mode + "?")) {
        socket.emit("set_mode", { mode: new_mode });
      }
    }

    socket.on("connect", () => {
        console.log("Connected");

        // 🔥 Request initial data
        socket.emit("request_initial_data");
    });

    socket.on("state_update", (data) => {
      console.log("socket.on(state_update) - data:", data);
      document.getElementById("select_mode").value = (data.mode);
      document.getElementById("slider_theta").value = (data.theta * 100).toFixed();
      document.getElementById("spin_theta").value = data.theta.toFixed(2);
      document.getElementById("slider_phi").value = (data.phi * 100).toFixed();
      document.getElementById("spin_phi").value = data.phi.toFixed(2);
      document.getElementById("slider_h").value = (data.h * 100).toFixed();
      document.getElementById("spin_h").value = data.h.toFixed(2);
      document.getElementById("label_h").textContent = data.h.toFixed(2);
      document.getElementById("label_theta_max").textContent = data.theta_max.toFixed(2);
      document.getElementById("label_x").textContent = data.x.toFixed(2);
      document.getElementById("label_y").textContent = data.y.toFixed(2);
      document.getElementById("label_z").textContent = data.z.toFixed(2);
      document.getElementById("label_theta1").textContent = data.theta1.toFixed(2);
      document.getElementById("label_theta2").textContent = data.theta2.toFixed(2);
      document.getElementById("label_theta3").textContent = data.theta3.toFixed(2);
      document.getElementById("robot_theta1_offset").textContent = data.theta1_offset.toFixed(2);
      document.getElementById("robot_theta2_offset").textContent = data.theta2_offset.toFixed(2);
      document.getElementById("robot_theta3_offset").textContent = data.theta3_offset.toFixed(2);
    });

    socket.on("params_update", (data) => {
      console.log("socket.on(params_update) - data:", data);
      document.getElementById("robot_lp").textContent = data.lp.toFixed(2);
      document.getElementById("robot_l1").textContent = data.l1.toFixed(2);
      document.getElementById("robot_l2").textContent = data.l2.toFixed(2);
      document.getElementById("robot_lb").textContent = data.lb.toFixed(2);
      document.getElementById("robot_minh").textContent = data.minh.toFixed(2);
      document.getElementById("robot_maxh").textContent = data.maxh.toFixed(2);
      document.getElementById("robot_theta_ubound").textContent = data.theta_ubound.toFixed(2);
      document.getElementById("slider_h").min = (data.minh * 100).toFixed();
      document.getElementById("slider_h").max = (data.maxh * 100).toFixed();
      document.getElementById("spin_h").min = data.minh.toFixed(2);
      document.getElementById("spin_h").max = data.maxh.toFixed(2);
    });
  </script>
</body>
</html>
